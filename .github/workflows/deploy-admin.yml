name: Deploy Web Admin

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-web-admin-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, deploy-admin]
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Docker Desktop (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          open -a "Docker Desktop" || true

      - name: Wait for Docker daemon
        shell: bash
        run: |
          docker context use desktop-linux || true

          for i in {1..60}; do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready"
              docker version
              docker compose version
              exit 0
            fi

            echo "Waiting for Docker..."
            sleep 2
          done

          echo "Docker not ready after waiting"
          docker context ls || true
          docker desktop status || true
          exit 1

      - name: Prepare clean Docker config for CI
        shell: bash
        run: |
          CI_DOCKER_CONFIG="$RUNNER_TEMP/docker-config"
          rm -rf "$CI_DOCKER_CONFIG"
          mkdir -p "$CI_DOCKER_CONFIG/cli-plugins"

          cat > "$CI_DOCKER_CONFIG/config.json" <<'EOF'
          {
            "auths": {}
          }
          EOF

          if [ -x "$HOME/.docker/cli-plugins/docker-compose" ]; then
            ln -sf "$HOME/.docker/cli-plugins/docker-compose" "$CI_DOCKER_CONFIG/cli-plugins/docker-compose"
          else
            echo "docker-compose plugin not found at $HOME/.docker/cli-plugins/docker-compose"
            exit 1
          fi

          if [ -x "$HOME/.docker/cli-plugins/docker-buildx" ]; then
            ln -sf "$HOME/.docker/cli-plugins/docker-buildx" "$CI_DOCKER_CONFIG/cli-plugins/docker-buildx"
          fi

          if [ -x "$HOME/.docker/cli-plugins/docker-desktop" ]; then
            ln -sf "$HOME/.docker/cli-plugins/docker-desktop" "$CI_DOCKER_CONFIG/cli-plugins/docker-desktop"
          fi

          echo "DOCKER_CONFIG=$CI_DOCKER_CONFIG" >> "$GITHUB_ENV"
          echo "DOCKER_HOST=unix:///Users/noviprima/.docker/run/docker.sock" >> "$GITHUB_ENV"

      - name: Set Compose project name
        shell: bash
        run: |
          echo "COMPOSE_PROJECT_NAME=fe-admin-gurumusik" >> "$GITHUB_ENV"

      - name: Verify Docker access
        shell: bash
        run: |
          docker version
          docker compose version
          docker info

      - name: Create .env
        shell: bash
        run: |
          rm -f .env
          cat > .env <<'EOF'
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          VITE_IMG_BASE_URL=${{ secrets.VITE_IMG_BASE_URL }}
          VITE_NODE_ENV=${{ secrets.VITE_NODE_ENV }}
          VITE_API_VERSION=${{ secrets.VITE_API_VERSION }}
          VITE_FILE_BASE_URL=${{ secrets.VITE_FILE_BASE_URL }}
          EOF

      - name: Stop old compose stack
        shell: bash
        run: |
          docker compose down --remove-orphans || true

      - name: Remove Docker container that occupies port 5173
        shell: bash
        run: |
          PORT_CONTAINERS="$(docker ps -q --filter publish=5173)"

          if [ -n "$PORT_CONTAINERS" ]; then
            echo "Removing Docker containers using port 5173:"
            docker ps --filter publish=5173 --format "table {{.ID}}\t{{.Names}}\t{{.Ports}}"
            docker rm -f $PORT_CONTAINERS
          else
            echo "No Docker container is using port 5173"
          fi

      - name: Check port 5173 after cleanup
        shell: bash
        run: |
          if lsof -nP -iTCP:5173 -sTCP:LISTEN >/dev/null 2>&1; then
            echo "Port 5173 is still busy after Docker cleanup:"
            lsof -nP -iTCP:5173 -sTCP:LISTEN || true
            exit 1
          fi

      - name: Build and run
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose up -d --build --remove-orphans

      - name: Show running containers
        shell: bash
        run: |
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"