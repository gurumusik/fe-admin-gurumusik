name: Deploy Web Admin

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-web-admin-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, deploy-admin]
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # (macOS) Pastikan Docker Desktop jalan
      - name: Start Docker Desktop (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          open -a "Docker Desktop" || true

      # Tunggu sampai Docker daemon siap dipakai
      - name: Wait for Docker daemon
        shell: bash
        run: |
          # pakai context Docker Desktop
          docker context use desktop-linux || true

          for i in {1..60}; do
            if docker info >/dev/null 2>&1; then
              echo "✅ Docker is ready"
              docker version
              docker compose version
              exit 0
            fi
            echo "Waiting for Docker..."
            sleep 2
          done

          echo "❌ Docker not ready after waiting"
          docker context ls || true
          exit 1

      - name: Check Docker status
        run: |
          docker --version
          docker compose version

      - name: Create .env
        shell: bash
        run: |
          rm -f .env
          cat > .env << 'EOF'
          # ====== Web Admin (Vite) Env ======
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          VITE_IMG_BASE_URL=${{ secrets.VITE_IMG_BASE_URL }}
          VITE_NODE_ENV=${{ secrets.VITE_NODE_ENV }}
          VITE_API_VERSION=${{ secrets.VITE_API_VERSION }}
          VITE_FILE_BASE_URL=${{ secrets.VITE_FILE_BASE_URL }}
          EOF

          echo "✅ .env created (keys only):"
          cut -d= -f1 .env

      - name: Stop old container (compose)
        shell: bash
        run: |
          docker compose down --remove-orphans || true

      - name: Force remove conflicting container if exists
        shell: bash
        run: |
          docker rm -f vite-frontend || true

      - name: Free port 5173 if busy
        shell: bash
        run: |
          if command -v lsof >/dev/null 2>&1; then
            lsof -tiTCP:5173 -sTCP:LISTEN | xargs -r kill -9 || true
          else
            docker ps --format "{{.ID}} {{.Ports}}" | awk '/:5173->/ {print $1}' | xargs -r docker rm -f || true
          fi

      - name: Build and run new container
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose up -d --build

      - name: Show running containers
        shell: bash
        run: |
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"