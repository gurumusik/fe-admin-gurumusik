services:
  vite-frontend:
    build: .
    ports:
      - "5173:5173"
    restart: always
    env_file:
      - .env
    networks:
      - localnet
    stdin_open: true
    tty: true

  vite-frontend-demo:
    build: .
    ports:
      - "5174:5174"
    restart: always
    env_file:
      - .env.demo
    networks:
      - localnet
    stdin_open: true
    tty: true

networks:
  localnet:
    driver: bridge