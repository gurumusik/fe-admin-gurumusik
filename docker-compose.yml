services:
  vite-frontend:
    build: 
      context: .
      args:
        ENV_FILE: .env
    ports:
      - "5173:5173"
    restart: always
    networks:
      - localnet

  vite-frontend-demo:
    build: 
      context: .
      args:
        ENV_FILE: demo.env
    ports:
      - "5174:5173"
    restart: always
    networks:
      - localnet

networks:
  localnet:
    driver: bridge